<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="preload"
      href="/src/assets/fonts/nunito/NunitoSans-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <script>
      // Anti-FOUC theme bootstrap. Runs synchronously before paint.
      // Storage key MUST match `storeName` in src/shared/store/ui.store.ts.
      (function () {
        try {
          var raw = localStorage.getItem('ui-storage-Architecture');
          var pref = raw ? JSON.parse(raw).state.theme : 'system';
          var dark =
            pref === 'dark' ||
            (pref === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
        } catch (e) {}
      })();
    </script>
    <title>architecture-v3</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
